<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅行规划地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>🌍 智能旅行规划地图</h1>
      <p>点击国家 → 城市 → 景点，放置钉子并自动生成多条游览路线。</p>
    </header>

    <main class="layout">
      <section class="map-panel">
        <div class="controls">
          <button id="clearPinsBtn" type="button">清空全部钉子</button>
          <button id="resetViewBtn" type="button">重置地图视角</button>
          <span class="hint">可直接点击地图任意位置放置自定义钉子</span>
        </div>
        <div id="map" aria-label="世界地图"></div>
      </section>

      <aside class="info-panel">
        <section>
          <h2>当前选中信息</h2>
          <div id="detailCard" class="card">
            <p>请先从地图中点击一个国家、城市或景点。</p>
          </div>
        </section>

        <section>
          <h2>已选景点钉子</h2>
          <ul id="pinList" class="list"></ul>
        </section>

        <section>
          <h2>自动路线推荐</h2>
          <div id="routePlans" class="card muted">
            <p>放置至少 2 个景点钉子后，会在此生成路线。</p>
          </div>
        </section>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./script.js"></script>
  </body>
</html>
